  <script>
    /* ── whoami typing effect ── */
    (function() {
      const el = document.getElementById('typed-cmd');
      const text = 'whoami';
      let i = 0;
      function type() {
        if (i < text.length) { el.textContent += text[i++]; setTimeout(type, 90 + Math.random() * 60); }
        else el.textContent += ' →';
      }
      setTimeout(type, 500);
    })();

    /* ── ls -la terminal ── */
    (function() {
      const el = document.getElementById('ls-terminal');
      if (!el) return;
      const cmd  = 'ls -la ~/j4mes';
      const rows = [
        { perm: 'drwxr-xr-x', key: 'role',        val: 'pentester'           },
        { perm: 'drwxr-xr-x', key: 'experience',   val: '~4.5 years'          },
        { perm: 'drwxr-xr-x', key: 'status',       val: 'hacking 4 PureCyber' },
        { perm: '-rw-r--r--', key: 'location',     val: 'UK'                  },
      ];
      let done = false;

      function run() {
        if (done) return;
        done = true;

        const promptLine = document.createElement('span');
        promptLine.className = 't-line';
        promptLine.innerHTML = '<span class="t-prompt">$</span> <span class="t-cmd" id="ls-cmd"></span>';
        el.appendChild(promptLine);

        const cmdEl = document.getElementById('ls-cmd');
        const termCursor = document.createElement('span');
        termCursor.style.cssText = 'display:inline-block;width:8px;height:1em;background:var(--accent);vertical-align:text-bottom;margin-left:1px;animation:blink 1s step-end infinite;';
        promptLine.appendChild(termCursor);

        let ci = 0;
        function typeCmd() {
          if (ci < cmd.length) {
            cmdEl.textContent += cmd[ci++];
            setTimeout(typeCmd, 60 + Math.random() * 40);
          } else {
            termCursor.style.animation = 'none';
            termCursor.style.opacity   = '0';
            setTimeout(showRows, 2000);
          }
        }
        typeCmd();

        function showRows() {
          rows.forEach(r => {
            const line = document.createElement('span');
            line.className = 't-line';
            line.innerHTML = `<span class="t-perm">${r.perm}</span>  <span class="t-key">${r.key}</span><span class="t-val">${r.val}</span>`;
            el.appendChild(line);
          });
        }
      }

      const obs = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) { setTimeout(run, 1500); obs.disconnect(); }
      }, { threshold: 0.3 });
      obs.observe(el);
    })();
  </script>
